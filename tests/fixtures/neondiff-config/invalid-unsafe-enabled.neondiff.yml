$schema: docs/schema/neondiff-config.schema.json
version: 1
review:
  profile: conservative
  maxComments: 12
  severityThreshold: medium
  pathInstructions: []
paths:
  include:
    - "**/*"
  exclude:
    - "dist/**"
    - "coverage/**"
    - "node_modules/**"
providers:
  default: openai-compatible
  allowed:
    - openai-compatible
  byok:
    required: true
    apiKeyEnv: NEONDIFF_PROVIDER_API_KEY
  local:
    enabled: false
    provider: none
    baseUrl: http://localhost:11434/v1
    model: ""
safetyGates:
  mutation:
    enabled: true
  secrets:
    blockSecretLikeText: true
  lineCoverage:
    requireCurrentDiffLine: true
  commentCaps:
    maxPerPullRequest: 12
    maxPerFile: 4
finishingTouches:
  enabled: true
  allowedCommands:
    - format
issueEnrichment:
  enabled: true
  allowlist: []
  throttles:
    maxIssuesPerHour: 10
    cooldownMinutes: 5
confidence:
  mode: uncalibrated
  displayPercentages: true
  calibrationEvidence: none
repo:
  visibility: public
  reviewDraftPullRequests: false
  publicRepoMode: activation-required
  privateRepoMode: requires-license
