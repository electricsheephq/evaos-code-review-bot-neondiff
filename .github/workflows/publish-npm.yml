name: Publish npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        default: v0.4.24-beta.1

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish neondiff
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Require v0.4.24-beta.1
        run: |
          test "${{ github.event.inputs.tag || github.event.release.tag_name }}" = "v0.4.24-beta.1"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: |
          npx vitest run tests/public-release-readiness.test.ts --pool=forks --maxWorkers=1
          npm pack --dry-run --json > pack.json
          node scripts/check-packlist.mjs pack.json

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag beta
