name: Desktop release smoke

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsigned-desktop-release-smoke:
    name: Unsigned desktop release smoke
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/neondiff-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run desktop Core tests with nonzero discovery
        shell: bash
        run: |
          core_test_output="$(mktemp)"
          trap 'rm -f "$core_test_output"' EXIT
          scripts/run-swift-tests.sh --filter NeonDiffDesktopCoreTests | tee "$core_test_output"
          grep -Eq 'Test run with [1-9][0-9]* tests?' "$core_test_output"

      - name: Build desktop Keychain checks
        run: swift build --target NeonDiffDesktopKeychainChecks

      - name: Run desktop appcast checks
        run: swift run NeonDiffDesktopAppcastChecks

      - name: Build unsigned app bundle
        run: script/build_and_run.sh build

      - name: Check unsigned app bundle
        run: script/build_and_run.sh bundle-check

      - name: Package unsigned app bundle and metadata
        env:
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
          NEONDIFF_DESKTOP_ARTIFACT_CLASSIFICATION: unsigned-desktop-release-smoke
          NEONDIFF_DESKTOP_UI_LAUNCH: "false"
          NEONDIFF_DESKTOP_VISUAL_SMOKE_REQUIRED: "true"
          NEONDIFF_DESKTOP_PROOF_BOUNDARY: non-release app bundle build, macOS 15 Keychain contract compilation, appcast checks, bundle structure check, artifact checksum, and metadata only
        run: script/release-proof.sh

      - name: Upload unsigned app bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neondiff-desktop-unsigned-app
          path: apps/neondiff-desktop/dist/release-smoke/NeonDiffDesktop.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload release-smoke metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neondiff-desktop-release-smoke-metadata
          path: apps/neondiff-desktop/dist/release-smoke/desktop-release-smoke-metadata.json
          if-no-files-found: error
          retention-days: 14
