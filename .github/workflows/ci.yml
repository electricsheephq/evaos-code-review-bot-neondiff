name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Enforce Review Bench public-corpus admission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -f docs/bench/review-bench-corpus-v1/corpus.json ]]; then
            echo "No published Review Bench Corpus v1 subset is present."
            exit 0
          fi
          node dist/src/cli.js review-bench verify-sources \
            --corpus docs/bench/review-bench-corpus-v1/corpus.json \
            --artifacts docs/bench/review-bench-corpus-v1/source-artifacts \
            --receipt "$RUNNER_TEMP/review-bench-live-receipt.json"
          node scripts/check-review-bench-admission-receipt.mjs \
            --live "$RUNNER_TEMP/review-bench-live-receipt.json" \
            --committed docs/bench/review-bench-corpus-v1/admission-receipt.json

      - name: Verify license API and OIDC lifecycle broker
        run: |
          npm ci --prefix services/license-api
          npm test --prefix services/license-api
          npm run build --prefix services/license-api

      - name: Focused public release tests
        run: npx vitest run tests/public-release-readiness.test.ts tests/public-community-funnel.test.ts tests/public-cli.test.ts tests/license.test.ts tests/release-status.test.ts --pool=forks --maxWorkers=1

      - name: Full test suite
        run: npm test -- --pool=forks --maxWorkers=1

      - name: Package packlist
        run: |
          npm pack --dry-run --json > pack.json
          node scripts/check-packlist.mjs pack.json

      - name: Forbidden public claims scan
        run: node scripts/check-public-claims.mjs

      - name: Secret scan
        run: node scripts/check-secret-scan.mjs
